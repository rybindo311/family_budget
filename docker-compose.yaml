services:
  db:
    image: postgres:15-alpine
    container_name: family_budget_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_NAME:-family-budget}
    ports:
      - "5432:5432"
    networks:
      - family_budget_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: family_budget_backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      DB_NAME: ${DB_NAME:-family-budget}
      ENVIRONMENT: prod
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - family_budget_network

volumes:
  postgres_data:

networks:
  family_budget_network:
    driver: bridge